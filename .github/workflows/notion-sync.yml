name: Sync Push to Notion

on:
  push:

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Notion Entry
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        with:
          script: |
            const res = await fetch('https://api.notion.com/v1/pages', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.NOTION_API_KEY}`,
                'Content-Type': 'application/json',
                'Notion-Version': '2022-06-28'
              },
              body: JSON.stringify({
                parent: { database_id: process.env.NOTION_DATABASE_ID },
                properties: {
                  'Commit':  { title:     [{ text: { content: context.payload.commits?.[0]?.message ?? '(no message)' } }] },
                  'Branch':  { rich_text: [{ text: { content: context.ref.replace('refs/heads/', '') } }] },
                  'Author':  { rich_text: [{ text: { content: context.actor } }] },
                  'SHA':     { rich_text: [{ text: { content: context.sha.slice(0, 7) } }] },
                  'Date':    { date:      { start: new Date().toISOString() } },
                  'Commits': { number:    context.payload.commits?.length ?? 0 }
                }
              })
            });
            if (!res.ok) throw new Error(await res.text());
            console.log('Notion entry created');
